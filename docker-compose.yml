services:
  excalidraw:
    build:
      context: .
      args:
        - NODE_ENV=production
      platforms:
        - linux/amd64  # Architecture de ton VPS Hetzner
    container_name: excalidraw
    expose:
      - "80"  # Nginx écoute sur le port 80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
